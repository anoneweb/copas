<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Template PABX</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f7f6;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        
        label { font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1; padding: 12px; color: white; border: none;
            border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        .btn-generate { background-color: #28a745; }
        .btn-generate:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; }
        .btn-clear:hover { background-color: #c82333; }
        .btn-copy { background-color: #007bff; }
        .btn-copy:hover { background-color: #0056b3; }

        .output-group { margin-top: 25px; }
        #hasilTeks { 
            width: 100%;
            height: 280px; 
            background-color: #fff; 
            font-family: monospace; 
            font-size: 14px; 
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }
    </style>
</head>
<body>

    <h2>Generator Template PABX</h2>

    <div class="form-group">
        <label for="pabx">Masukkan Data PABX:</label>
        <input type="text" id="pabx" placeholder="Ketik data PABX di sini...">
    </div>

    <div class="button-group">
        <button onclick="buatTemplate()" class="btn-generate">Generate Teks</button>
        <button onclick="clearForm()" class="btn-clear">Clear Data</button>
    </div>

    <div class="output-group">
        <label for="hasilTeks">Hasil Template:</label>
        <textarea id="hasilTeks" readonly placeholder="Hasil format teks akan muncul di sini..."></textarea>
        
        <div class="button-group">
            <button onclick="copyTeks()" class="btn-copy">Copy Hasil Teks</button>
        </div>
    </div>

    <script>
        function buatTemplate() {
            // Mengambil nilai PABX
            const pabx = document.getElementById('pabx').value;

            if(!pabx) {
                alert("Harap isi data PABX terlebih dahulu!");
                return;
            }

            // Menyusun format, hanya PABX yang terisi sesuai input, sisanya statis
            const template = `${pabx} / CASE

${pabx} / NoIH / Case / HVC
Nama Pelanggan : 
CP : 
Detail case : 
Lapul/Gaul :  
Status Nomor di DSC : 
Sub Status : 
Status Pembayaran : 
Type ONT : 
Capt lightshoot : 
KATEGORI : `;

            // Menampilkan ke kotak hasil
            document.getElementById('hasilTeks').value = template;
        }

        function clearForm() {
            // Mengosongkan input PABX dan kotak hasil
            document.getElementById('pabx').value = '';
            document.getElementById('hasilTeks').value = '';
            
            // Kembalikan kursor ke input PABX agar siap mengetik lagi
            document.getElementById('pabx').focus();
        }

        function copyTeks() {
            const teks = document.getElementById('hasilTeks');
            if(!teks.value) {
                alert("Belum ada teks yang bisa dicopy!");
                return;
            }
            teks.select();
            teks.setSelectionRange(0, 99999); // Kompatibilitas untuk layar HP
            navigator.clipboard.writeText(teks.value)
                .then(() => alert("Teks berhasil disalin!"))
                .catch(err => alert("Gagal menyalin teks."));
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Tiket PABX</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background-color: #f4f7f6;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        /* Grid untuk membagi form menjadi 2 kolom agar rapi */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        
        label { font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input[type="text"], textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1; padding: 12px; color: white; border: none;
            border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        .btn-generate { background-color: #28a745; }
        .btn-generate:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; }
        .btn-clear:hover { background-color: #c82333; }
        .btn-copy { background-color: #007bff; }
        .btn-copy:hover { background-color: #0056b3; }

        .output-group { margin-top: 25px; }
        #hasilTeks { height: 250px; background-color: #fff; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Form Laporan PABX / CASE</h2>

    <div class="form-grid">
        <div class="form-group">
            <label for="pabx">PABX:</label>
            <input type="text" id="pabx" placeholder="Contoh: PBX-123">
        </div>
        <div class="form-group">
            <label for="case_id">CASE:</label>
            <input type="text" id="case_id" placeholder="Nomor Case">
        </div>
        <div class="form-group">
            <label for="no_ih">NoIH:</label>
            <input type="text" id="no_ih" placeholder="Nomor IH">
        </div>
        <div class="form-group">
            <label for="hvc">HVC:</label>
            <input type="text" id="hvc" placeholder="Status HVC (Ya/Tidak)">
        </div>
        <div class="form-group">
            <label for="nama_pelanggan">Nama Pelanggan:</label>
            <input type="text" id="nama_pelanggan" placeholder="Nama lengkap">
        </div>
        <div class="form-group">
            <label for="cp">CP (Contact Person):</label>
            <input type="text" id="cp" placeholder="Nomor HP / Telp">
        </div>
        
        <div class="form-group full-width">
            <label for="detail_case">Detail Case:</label>
            <textarea id="detail_case" rows="3" placeholder="Jelaskan detail kendala di sini..."></textarea>
        </div>

        <div class="form-group">
            <label for="lapul_gaul">Lapul/Gaul:</label>
            <input type="text" id="lapul_gaul" placeholder="Isi Lapul/Gaul">
        </div>
        <div class="form-group">
            <label for="status_dsc">Status Nomor di DSC:</label>
            <input type="text" id="status_dsc" placeholder="Status di DSC">
        </div>
        <div class="form-group">
            <label for="sub_status">Sub Status:</label>
            <input type="text" id="sub_status" placeholder="Sub status">
        </div>
        <div class="form-group">
            <label for="status_bayar">Status Pembayaran:</label>
            <input type="text" id="status_bayar" placeholder="Lunas / Belum Lunas">
        </div>
        <div class="form-group">
            <label for="type_ont">Type ONT:</label>
            <input type="text" id="type_ont" placeholder="Merek/Tipe ONT">
        </div>
        <div class="form-group">
            <label for="capt_lightshoot">Capt lightshoot:</label>
            <input type="text" id="capt_lightshoot" placeholder="Link / Info Screenshot">
        </div>
        <div class="form-group full-width">
            <label for="kategori">KATEGORI:</label>
            <input type="text" id="kategori" placeholder="Kategori gangguan">
        </div>
    </div>

    <div class="button-group">
        <button onclick="buatTemplate()" class="btn-generate">Generate Teks</button>
        <button onclick="clearForm()" class="btn-clear">Clear Data</button>
    </div>

    <div class="output-group">
        <label for="hasilTeks">Hasil Template:</label>
        <textarea id="hasilTeks" readonly placeholder="Hasil format teks akan muncul di sini..."></textarea>
        
        <div class="button-group">
            <button onclick="copyTeks()" class="btn-copy">Copy Hasil Teks</button>
        </div>
    </div>

    <script>
        function buatTemplate() {
            // Mengambil semua nilai dari form
            const pabx = document.getElementById('pabx').value;
            const caseId = document.getElementById('case_id').value;
            const noIh = document.getElementById('no_ih').value;
            const hvc = document.getElementById('hvc').value;
            const nama = document.getElementById('nama_pelanggan').value;
            const cp = document.getElementById('cp').value;
            const detail = document.getElementById('detail_case').value;
            const lapulGaul = document.getElementById('lapul_gaul').value;
            const statusDsc = document.getElementById('status_dsc').value;
            const subStatus = document.getElementById('sub_status').value;
            const statusBayar = document.getElementById('status_bayar').value;
            const typeOnt = document.getElementById('type_ont').value;
            const capt = document.getElementById('capt_lightshoot').value;
            const kategori = document.getElementById('kategori').value;

            // Menyusun format sesuai permintaan
            const template = `${pabx} / ${caseId}

${pabx} / ${noIh} / ${caseId} / ${hvc}
Nama Pelanggan : ${nama}
CP : ${cp}
Detail case : ${detail}
Lapul/Gaul : ${lapulGaul}
Status Nomor di DSC : ${statusDsc}
Sub Status : ${subStatus}
Status Pembayaran : ${statusBayar}
Type ONT : ${typeOnt}
Capt lightshoot : ${capt}
KATEGORI : ${kategori}`;

            // Menampilkan ke kotak hasil
            document.getElementById('hasilTeks').value = template;
        }

        function clearForm() {
            // Mengosongkan semua input
            const inputs = document.querySelectorAll('input[type="text"], textarea');
            inputs.forEach(input => input.value = '');
            
            // Kembalikan kursor ke input PABX
            document.getElementById('pabx').focus();
        }

        function copyTeks() {
            const teks = document.getElementById('hasilTeks');
            if(!teks.value) {
                alert("Belum ada teks yang bisa dicopy!");
                return;
            }
            teks.select();
            teks.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(teks.value)
                .then(() => alert("Teks berhasil disalin!"))
                .catch(err => alert("Gagal menyalin teks."));
        }
    </script>

</body>
</html>
